<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thommy Liquor Store</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Poppins',sans-serif;
background:linear-gradient(270deg,#0f0f0f,#1a1a1a,#000);
background-size:600% 600%;
animation:bg 12s infinite;
color:white;
}

@keyframes bg{
0%{background-position:0%}
50%{background-position:100%}
100%{background-position:0%}
}

/* LOGO */
.logo{
text-align:center;
padding:10px;
font-weight:bold;
color:#ffd700;
text-shadow:0 0 10px orange;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
padding:10px;
}

/* CARD */
.card{
background:#1c1c1c;
border-radius:18px;
overflow:hidden;
box-shadow:0 0 15px rgba(255,140,0,0.2);
transition:.3s;
position:relative;
}

.card:hover{
transform:scale(1.05);
box-shadow:0 0 25px orange;
}

.card img{
width:100%;
height:150px;
object-fit:cover;
}

/* BADGES */
.badge{
position:absolute;
top:8px;
left:8px;
padding:3px 6px;
font-size:10px;
border-radius:6px;
}

.oferta{background:red;}
.top{background:gold;color:black;}

/* INFO */
.info{padding:10px;}
.name{font-size:13px;}
.price{color:#00ffcc;font-weight:bold;}

.controls{
display:flex;
justify-content:space-between;
margin-top:8px;
}

/* BOTONES */
.btn{
background:linear-gradient(45deg,#ff6600,#ffcc00);
border:none;
padding:6px 10px;
border-radius:10px;
font-weight:bold;
}

.qty{font-size:14px;}

/* ANIMACIÓN */
@keyframes pop{
0%{transform:scale(1)}
50%{transform:scale(1.3)}
100%{transform:scale(1)}
}
.pop{animation:pop 0.3s;}

/* CARRITO */
.cart{
position:fixed;
bottom:0;
width:100%;
background:#111;
padding:10px;
font-size:12px;
box-shadow:0 -5px 20px black;
}

.cart button{
width:100%;
margin-top:5px;
padding:10px;
border:none;
border-radius:10px;
background:linear-gradient(45deg,#00ffcc,#00cc99);
font-weight:bold;
}
</style>
</head>

<body>

<div class="logo">🍾 THOMMY LIQUOR STORE</div>

<div class="grid" id="productos"></div>

<div class="cart">

<input id="cliente" placeholder="Nombre">
<input id="direccion" placeholder="Dirección">

<select id="pago">
<option>Yape</option>
<option>Plin</option>
<option>Efectivo</option>
</select>

<select id="delivery">
<option value="5">Normal S/5</option>
<option value="10">Express S/10</option>
</select>

🛒 <span id="contador">0</span>  
💰 <span id="total">0</span>

<div id="detalle"></div>

<button onclick="pedir()">Pedir</button>
<button onclick="abrirAdmin()">⚙️ Admin</button>

</div>

<script>
let carrito=[];
let pedidos=JSON.parse(localStorage.getItem("pedidos"))||[];

const PASS="1234";

const productos=[
{nombre:"Vino Tabernero Tuyo Rose",precio:16,img:"img/vino.png",oferta:true},
{nombre:"Ron Cartavio Black",precio:26,img:"img/cartavio.png",top:true},
{nombre:"Ron Cabo Blanco Black",precio:18,img:"img/cabo.png"},
{nombre:"Anisado Torre Blanca",precio:16,img:"img/anisado.png"},
{nombre:"Whisky Old Times Red",precio:24,img:"img/whisky.png",top:true},
{nombre:"Pack Chilcanero La Mancha",precio:30,img:"img/pack.png",oferta:true}
];

const cont=document.getElementById("productos");

/* ORDENAR: destacados primero */
productos.sort((a,b)=>(b.top||false)-(a.top||false));

productos.forEach((p,i)=>{
carrito[i]=0;

cont.innerHTML+=`
<div class="card">
${p.oferta?'<div class="badge oferta">OFERTA</div>':''}
${p.top?'<div class="badge top">TOP</div>':''}

<img src="${p.img}">

<div class="info">
<div class="name">${p.nombre}</div>
<div class="price">S/ ${p.precio}</div>

<div class="controls">
<button class="btn" onclick="add(${i})">+</button>
<div class="qty" id="q${i}">0</div>
<button class="btn" onclick="remove(${i})">-</button>
</div>
</div>
</div>
`;
});

function add(i){
carrito[i]++;
let el=document.getElementById("q"+i);
el.classList.add("pop");
setTimeout(()=>el.classList.remove("pop"),300);
update();
}

function remove(i){
if(carrito[i]>0)carrito[i]--;
update();
}

function update(){
let total=0,items=0,detalle="";

productos.forEach((p,i)=>{
let c=carrito[i];
document.getElementById("q"+i).innerText=c;

if(c>0){
total+=c*p.precio;
items+=c;
detalle+=`${p.nombre} x${c}<br>`;
}
});

document.getElementById("contador").innerText=items;
document.getElementById("total").innerText=total;
document.getElementById("detalle").innerHTML=detalle;
}

function generarID(){
return "PED-"+Date.now();
}

function pedir(){
let nombre=document.getElementById("cliente").value;
let direccion=document.getElementById("direccion").value;

if(!nombre||!direccion){
alert("Completa tus datos");
return;
}

let total=0;
let msg="🧾 PEDIDO%0A";

productos.forEach((p,i)=>{
let c=carrito[i];
if(c>0){
let sub=c*p.precio;
msg+=`${p.nombre} x${c} S/${sub}%0A`;
total+=sub;
}
});

msg+=`💰 Total S/${total}`;

window.open("https://wa.me/51966286024?text="+msg);
}

function abrirAdmin(){
let pass=prompt("Clave:");
if(pass!==PASS)return;
alert("Panel admin activo (modo visual)");
}
</script>

</body>
</html>
