<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thommy Liquor Store</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Poppins',sans-serif;
background:#0f0f0f;
color:white;
}

/* LOGO */
.logo-container{
text-align:center;
padding:10px;
}
.logo-img{width:110px;}
.brand{color:#ffd700;font-weight:bold;}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
padding-bottom:180px; /* 🔥 SOLUCIÓN CLAVE */
}

/* CARD */
.card{
background:#1c1c1c;
border-radius:12px;
overflow:hidden;
position:relative;
}

.card img{
width:100%;
height:120px;
object-fit:cover;
cursor:pointer;
}

/* BADGE */
.badge{
position:absolute;
top:5px;
left:5px;
font-size:10px;
padding:3px 6px;
border-radius:5px;
}
.oferta{background:red;}
.top{background:gold;color:black;}

.info{padding:6px;font-size:12px;}
.price{color:#00ffcc;font-weight:bold;}

.controls{
display:flex;
justify-content:space-between;
}

/* BOTONES */
.btn{
background:orange;
border:none;
padding:5px;
border-radius:6px;
}

/* CARRITO */
.cart{
position:fixed;
bottom:0;
width:100%;
background:#111;
padding:8px;
font-size:11px;
box-shadow:0 -5px 20px black;
}

.cart input,.cart select{
width:100%;
margin:2px 0;
padding:5px;
border-radius:5px;
border:none;
font-size:11px;
}

.cart button{
width:100%;
margin-top:3px;
padding:8px;
border:none;
border-radius:6px;
background:#00ffcc;
font-weight:bold;
}

/* MODAL */
.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
justify-content:center;
align-items:center;
}
.modal img{
width:90%;
border-radius:10px;
}
</style>
</head>

<body>

<div class="logo-container">
<img src="img/logo.png" class="logo-img">
<div class="brand">THOMMY LIQUOR STORE</div>
</div>

<div class="grid" id="productos"></div>

<!-- MODAL -->
<div class="modal" id="modal" onclick="cerrarModal()">
<img id="imgModal">
</div>

<!-- CARRITO -->
<div class="cart">

<input id="cliente" placeholder="Nombre">
<input id="direccion" placeholder="Dirección">

<select id="pago">
<option>Yape</option>
<option>Plin</option>
<option>Efectivo</option>
</select>

<div id="horario"></div>

🛒 <span id="contador">0</span>  
💰 S/ <span id="total">0</span>

<div id="detalle"></div>

<button onclick="pedir()">Pedir</button>

</div>

<script>
let carrito=[];

const productos=[
{nombre:"Vino Tabernero Tuyo Rose",precio:16,img:"img/vino.png",oferta:true},
{nombre:"Ron Cartavio Black",precio:26,img:"img/cartavio.png",top:true},
{nombre:"Ron Cabo Blanco Black",precio:18,img:"img/cabo.png"},
{nombre:"Anisado Torre Blanca",precio:16,img:"img/anisado.png"},
{nombre:"Whisky Old Times Red",precio:24,img:"img/whisky.png",top:true},
{nombre:"Pack Chilcanero La Mancha",precio:30,img:"img/pack.png",oferta:true}
];

const cont=document.getElementById("productos");

/* RENDER */
productos.forEach((p,i)=>{
carrito[i]=0;

cont.innerHTML+=`
<div class="card">
${p.oferta?'<div class="badge oferta">OFERTA</div>':''}
${p.top?'<div class="badge top">TOP</div>':''}

<img src="${p.img}" onclick="verImg('${p.img}')">

<div class="info">
${p.nombre}<br>
<span class="price">S/ ${p.precio}</span>

<div class="controls">
<button class="btn" onclick="add(${i})">+</button>
<span id="q${i}">0</span>
<button class="btn" onclick="remove(${i})">-</button>
</div>

</div>
</div>
`;
});

/* FUNCIONES */
function add(i){carrito[i]++;update();}
function remove(i){if(carrito[i]>0)carrito[i]--;update();}

function update(){
let total=0,items=0,detalle="";

productos.forEach((p,i)=>{
let c=carrito[i];
document.getElementById("q"+i).innerText=c;

if(c>0){
total+=c*p.precio;
items+=c;
detalle+=`${p.nombre} x${c}<br>`;
}
});

document.getElementById("contador").innerText=items;
document.getElementById("total").innerText=total;
document.getElementById("detalle").innerHTML=detalle;
}

/* MODAL */
function verImg(src){
modal.style.display="flex";
imgModal.src=src;
}
function cerrarModal(){modal.style.display="none";}

/* DELIVERY POR HORA */
function estadoDelivery(){
let h=new Date().getHours();
let texto="";

if(h<19){
texto="🚚 Delivery Normal disponible (hasta 7pm)";
}else if(h>=20 || h<=3){
texto="⚡ Delivery Express activo (8pm - 3am)";
}else{
texto="⏳ Preparando horario de delivery";
}

document.getElementById("horario").innerText=texto;
}
estadoDelivery();

/* PEDIR */
function pedir(){
let nombre=cliente.value;
let direccion=direccionInput= document.getElementById("direccion").value;

if(!nombre||!direccion){
alert("Completa datos");
return;
}

let msg="🧾 PEDIDO%0A";

productos.forEach((p,i)=>{
let c=carrito[i];
if(c>0){
msg+=`${p.nombre} x${c}%0A`;
}
});

msg+=`👤 ${nombre}%0A🏠 ${direccion}`;

window.open("https://wa.me/51966286024?text="+msg);
}
</script>

</body>
</html>
