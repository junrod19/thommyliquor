<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thommy Liquor Store</title>

<style>
body{margin:0;font-family:sans-serif;background:#0f0f0f;color:white;}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
padding:10px;
}

.card{background:#1c1c1c;border-radius:10px;overflow:hidden;}
.card img{width:100%;height:120px;object-fit:cover;}

.info{padding:6px;font-size:12px;}
.controls{display:flex;justify-content:space-between;}

button{padding:5px;border:none;border-radius:6px;}

.cart{
position:fixed;
bottom:0;
width:100%;
background:#111;
padding:10px;
font-size:12px;
}

.admin{
position:fixed;
top:0;
right:0;
background:black;
width:100%;
height:100%;
display:none;
overflow:auto;
padding:15px;
}

.admin h2{color:#00ffcc;}
</style>
</head>

<body>

<div class="grid" id="productos"></div>

<div class="cart">

<input id="cliente" placeholder="Nombre">
<input id="direccion" placeholder="Dirección">

<select id="pago">
<option>Yape</option>
<option>Plin</option>
<option>Efectivo</option>
</select>

<select id="delivery">
<option value="5">Normal S/5</option>
<option value="10">Express S/10</option>
</select>

🛒 <span id="contador">0</span>
💰 <span id="total">0</span>

<div id="detalle"></div>

<button onclick="pedir()">Pedir</button>
<button onclick="abrirAdmin()">⚙️</button>

</div>

<!-- PANEL ADMIN -->
<div class="admin" id="adminPanel">
<h2>Panel Admin</h2>

<div id="stats"></div>
<div id="listaPedidos"></div>

<button onclick="cerrarAdmin()">Cerrar</button>
</div>

<script>
let carrito=[];
let pedidos=JSON.parse(localStorage.getItem("pedidos"))||[];

const PASS="1234";

const productos=[
{nombre:"Vino",precio:16,img:"img/vino.png"},
{nombre:"Ron",precio:26,img:"img/cartavio.png"},
{nombre:"Whisky",precio:24,img:"img/whisky.png"}
];

const cont=document.getElementById("productos");

productos.forEach((p,i)=>{
carrito[i]=0;

cont.innerHTML+=`
<div class="card">
<img src="${p.img}">
<div class="info">
${p.nombre} S/${p.precio}
<div class="controls">
<button onclick="add(${i})">+</button>
<span id="q${i}">0</span>
<button onclick="remove(${i})">-</button>
</div>
</div>
</div>
`;
});

function add(i){carrito[i]++;update();}
function remove(i){if(carrito[i]>0)carrito[i]--;update();}

function update(){
let total=0,items=0,detalle="";

productos.forEach((p,i)=>{
let c=carrito[i];
document.getElementById("q"+i).innerText=c;

if(c>0){
total+=c*p.precio;
items+=c;
detalle+=`${p.nombre} x${c}<br>`;
}
});

document.getElementById("contador").innerText=items;
document.getElementById("total").innerText=total;
document.getElementById("detalle").innerHTML=detalle;
}

function generarID(){
return "PED-"+Date.now();
}

function pedir(){

let nombre=document.getElementById("cliente").value;
let direccion=document.getElementById("direccion").value;
let pago=document.getElementById("pago").value;
let del=parseInt(document.getElementById("delivery").value);

if(!nombre||!direccion){
alert("Completa datos");
return;
}

let id=generarID();
let total=0;

let detalle=[];

productos.forEach((p,i)=>{
let c=carrito[i];
if(c>0){
let sub=c*p.precio;
detalle.push({producto:p.nombre,cantidad:c,sub});
total+=sub;
}
});

let final=total+del;

let pedido={
id,
nombre,
direccion,
pago,
detalle,
total:final,
estado:"Pendiente",
fecha:new Date().toLocaleString()
};

pedidos.push(pedido);
localStorage.setItem("pedidos",JSON.stringify(pedidos));

let msg=`🧾 ${id}%0A👤 ${nombre}%0A🏠 ${direccion}%0A`;

detalle.forEach(d=>{
msg+=`${d.producto} x${d.cantidad} S/${d.sub}%0A`;
});

msg+=`💰 Total S/${final}%0A💳 ${pago}`;

window.open("https://wa.me/51966286024?text="+msg);

carrito=carrito.map(()=>0);
update();
}

function abrirAdmin(){
let pass=prompt("Clave admin:");
if(pass!==PASS)return;

document.getElementById("adminPanel").style.display="block";

let totalVentas=0;

pedidos.forEach(p=>totalVentas+=p.total);

document.getElementById("stats").innerHTML=
`💰 Ventas: S/${totalVentas}<br>
📦 Pedidos: ${pedidos.length}<br>
📊 Promedio: S/${(totalVentas/pedidos.length||0).toFixed(2)}`;

let html="";

pedidos.forEach((p,i)=>{
html+=`
<div>
<b>${p.id}</b> - ${p.nombre} - S/${p.total}<br>
Estado: ${p.estado}
<button onclick="estado(${i})">Cambiar</button>
<hr>
</div>
`;
});

document.getElementById("listaPedidos").innerHTML=html;
}

function estado(i){
let estados=["Pendiente","En camino","Entregado"];
let actual=pedidos[i].estado;
let next=estados[(estados.indexOf(actual)+1)%3];
pedidos[i].estado=next;
localStorage.setItem("pedidos",JSON.stringify(pedidos));
abrirAdmin();
}

function cerrarAdmin(){
document.getElementById("adminPanel").style.display="none";
}
</script>

</body>
</html>
