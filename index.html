<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thommy Liquor Store</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Poppins',sans-serif;
background:#0f0f0f;
color:white;
}

/* 🔥 LOGO GRANDE */
.logo-container{
text-align:center;
padding:20px 10px;
}

.logo-img{
width:240px;
animation:glow 2s infinite alternate;
}

@keyframes glow{
0%{filter:drop-shadow(0 0 10px gold);}
100%{filter:drop-shadow(0 0 40px orange);}
}

.brand{
font-size:20px;
color:#ffd700;
font-weight:bold;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
padding-bottom:120px;
}

/* CARD */
.card{
background:#1c1c1c;
border-radius:12px;
overflow:hidden;
}

.card img{
width:100%;
height:120px;
object-fit:cover;
cursor:pointer;
}

.info{
padding:6px;
font-size:12px;
}

.price{
color:#00ffcc;
font-weight:bold;
}

.controls{
display:flex;
justify-content:space-between;
}

.btn{
background:orange;
border:none;
padding:5px;
border-radius:6px;
}

/* 🛒 CARRITO MINIMAL */
.cart{
position:fixed;
bottom:60px;
width:100%;
background:#111;
padding:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

.cart button{
background:#00ffcc;
border:none;
padding:10px;
border-radius:8px;
font-weight:bold;
}

/* REDES */
.nav{
position:fixed;
bottom:0;
width:100%;
background:#000;
display:flex;
justify-content:space-around;
padding:10px 0;
}

.nav a{
color:white;
text-decoration:none;
font-size:12px;
}

.nav a:active{
color:#00ffcc;
}

/* MODAL */
.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
justify-content:center;
align-items:center;
}
.modal img{
width:90%;
}
</style>
</head>

<body>

<!-- LOGO -->
<div class="logo-container">
<img src="img/logo.png" class="logo-img">
<div class="brand">THOMMY LIQUOR STORE</div>
</div>

<!-- PRODUCTOS -->
<div class="grid" id="productos"></div>

<!-- MODAL -->
<div class="modal" id="modal" onclick="cerrarModal()">
<img id="imgModal">
</div>

<!-- CARRITO SIMPLE -->
<div class="cart">
<div>
🛒 <span id="contador">0</span>  
💰 S/ <span id="total">0</span>
</div>
<button onclick="pedir()">Pedir</button>
</div>

<!-- REDES -->
<div class="nav">
<a href="#">Inicio</a>
<a href="https://facebook.com/thommy.liquor">Facebook</a>
<a href="https://instagram.com/thommy.liquor">Instagram</a>
<a href="https://tiktok.com/@thommy.liquor">TikTok</a>
</div>

<script>
let carrito = new Array(6).fill(0);

const productos=[
{nombre:"Vino Tabernero Tuyo Rose",precio:16,img:"img/vino.png"},
{nombre:"Ron Cartavio Black",precio:26,img:"img/cartavio.png"},
{nombre:"Ron Cabo Blanco Black",precio:18,img:"img/cabo.png"},
{nombre:"Anisado Torre Blanca",precio:16,img:"img/anisado.png"},
{nombre:"Whisky Old Times Red",precio:24,img:"img/whisky.png"},
{nombre:"Pack Chilcanero La Mancha",precio:30,img:"img/pack.png"}
];

const cont=document.getElementById("productos");

/* RENDER */
productos.forEach((p,i)=>{
cont.innerHTML+=`
<div class="card">
<img src="${p.img}" onclick="verImg('${p.img}')">
<div class="info">
${p.nombre}<br>
<span class="price">S/ ${p.precio}</span>

<div class="controls">
<button class="btn" onclick="add(${i})">+</button>
<span id="q${i}">0</span>
<button class="btn" onclick="remove(${i})">-</button>
</div>

</div>
</div>
`;
});

/* FUNCIONES */
function add(i){
carrito[i]++;
update();
}

function remove(i){
if(carrito[i]>0) carrito[i]--;
update();
}

function update(){
let total=0;
let items=0;

productos.forEach((p,i)=>{
let c=carrito[i];
document.getElementById("q"+i).innerText=c;

total += c * p.precio;
items += c;
});

document.getElementById("contador").innerText=items;
document.getElementById("total").innerText=total;
}

/* MODAL */
function verImg(src){
modal.style.display="flex";
imgModal.src=src;
}
function cerrarModal(){
modal.style.display="none";
}

/* PEDIR */
function pedir(){

let items = carrito.reduce((a,b)=>a+b,0);

if(items===0){
alert("Agrega productos primero 🛒");
return;
}

let mensaje="🧾 PEDIDO%0A%0A";

productos.forEach((p,i)=>{
let c=carrito[i];
if(c>0){
mensaje+=`${p.nombre} x${c}%0A`;
}
});

mensaje+="%0A📲 Pago: Yape / Plin";

window.open("https://wa.me/51966286024?text="+mensaje);
}
</script>

</body>
</html>
